<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<title>Eid Greeting</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to top,#1A1A1A,#0B1D3A,#1C3F60);
    overflow: hidden;
    color: white;
    text-align: center;
    font-family: 'Dancing Script', cursive;
}

/* Curtains */
.curtain {
    position: fixed;
    top: 0;
    width: 50%;
    height: 100%;
    background: #0B1D3A;
    z-index: 10;
    transition: transform 1.5s ease;
    display: block;
}
.left { left: 0; transform: translateX(-100%); }
.right { right: 0; transform: translateX(100%); }

/* Input */
.container {
    position: relative;
    top: 180px;
}

input {
    padding:12px;
    border-radius:10px;
    border:none;
}

button {
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:gold;
    cursor:pointer;
}

#countdown {
    font-size:60px;
    margin-top:20px;
}

/* Second Screen */
#secondScreen {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(to top,#1A1A1A,#0B1D3A,#1C3F60);
    padding: 50px 0;
    font-family: 'Dancing Script', cursive;
}

#secondScreen h1 {
    color: gold;
    text-shadow: 0 0 12px gold;
}

@media(max-width:420px){
    #secondScreen h1 {
        padding-top: 80px;
        width:90%;
        margin: 0 auto;
        font-size:30px;
    }
    #secondScreen p{
        font-size: 20px;
    }
}

/* Final Image */
#finalImage {
    display: none;
    position: fixed;   /* 🔥 important fix */
    top: 0;
    left: 0;
    width: 100vw;      /* 🔥 full width */
    height: 100vh;     /* 🔥 full height */
}

#finalImage img {
 
    object-fit: cover; /* 🔥 perfect fit for mobile */
    margin:0 auto;
    width: 100%;
    height: 90%;
    object-fit: cover;

    border: 20px solid #B6771D;     /* ⭐ border */
    box-sizing: border-box;     /* ⭐ keeps size balanced */
}
@media(max-width:420px){
    #finalImage img{
        
        overflow-x: hidden;
        overflow-y: hidden;
    }
}

/* Stars */
.star {
    position: absolute;
    width: 12px;
    height: 12px;
    box-shadow: 0 0 8px currentColor;
    clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from {opacity:0.2;}
    to {opacity:1;}
}
</style>
</head>

<body>

<!-- Curtains -->
<div class="curtain left"></div>
<div class="curtain right"></div>

<!-- Input -->
<div class="container">
    <h2>🌙 Enter Your Name</h2>
    <input type="text" id="name" placeholder="Your name"><br><br>
    <button onclick="start()">Reveal Surprise 🎁</button>
    <div id="countdown"></div>
</div>

<!-- Second Screen -->
<div id="secondScreen">
    <h1>Wishing a very Beautiful and Blessed Eid ul Fitr Mubarik, Dear <span id="userName"></span> 🌙</h1>
    <p>To you and your family 🤍</p>
    <div class="arabic">تقبل الله منا ومنكم</div>
</div>

<!-- Final Image -->
<div id="finalImage">
    <img src="eid (2).jpeg" alt="Eid Wish">
</div>

<script>
// Stars
let colors = ["gold", "#fff5a5", "#065f46", "#36064D", "#ffd1dc" ,"#D4AF37" ,"#9B0F06"];

for(let i=0;i<80;i++){
    let star=document.createElement("div");
    star.classList.add("star");

    // ⭐ THIS LINE WAS MISSING
    star.style.background = colors[Math.floor(Math.random()*colors.length)];

    star.style.top=Math.random()*100+"vh";
    star.style.left=Math.random()*100+"vw";
    star.style.animationDelay=Math.random()*2+"s";

    document.body.appendChild(star);
}

// Start function
function start(){
    let name=document.getElementById("name").value;
    if(name===""){ alert("Enter your name!"); return;}

    let count=3;
    let cd=document.getElementById("countdown");

    let interval=setInterval(()=>{
        cd.innerText=count;
        count--;

        if(count<0){
            clearInterval(interval);
            cd.innerText="";
            showSecond(name);
        }
    },1000);
}

// Step 2
function showSecond(name){
    document.querySelector(".container").style.display="none";

    document.getElementById("userName").innerText = name;
    document.getElementById("secondScreen").style.display="block";

    setTimeout(()=> {
        startCurtain();
    },4000);  // 🔥 CHANGED from 10000 → 4000 (4 seconds)
}

// Curtain transition
function startCurtain(){
    let left=document.querySelector(".left");
    let right=document.querySelector(".right");

    // Close curtains
    left.style.transform="translateX(0)";
    right.style.transform="translateX(0)";

    setTimeout(()=> {
        document.getElementById("secondScreen").style.display="none";
        document.getElementById("finalImage").style.display="block";

        // Open curtains
        left.style.transform="translateX(-100%)";
        right.style.transform="translateX(100%)";
    },1500);
}
</script>

</body>
</html>
